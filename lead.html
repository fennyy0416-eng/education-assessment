<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>获取完整报告</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(180deg, #eef4fb 0%, #edf2f8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border-radius: 22px;
            padding: 32px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(255,255,255,0.9);
        }

        .tag {
            display: inline-block;
            font-size: 12px;
            color: #2563eb;
            background: #eff6ff;
            border: 1px solid #dbeafe;
            padding: 6px 10px;
            border-radius: 999px;
            margin-bottom: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 28px;
            color: #0f172a;
        }

        p {
            margin: 0 0 22px;
            color: #64748b;
            line-height: 1.8;
            font-size: 14px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
        }

        input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid #dbe3ee;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            background: #f8fbff;
        }

        input:focus {
            border-color: #93c5fd;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
            background: #fff;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 140px;
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn.primary {
            background: linear-gradient(90deg, #2563eb 0%, #3b82f6 100%);
            color: white;
        }

        .btn.secondary {
            background: #e2e8f0;
            color: #0f172a;
        }

        .status {
            margin-top: 14px;
            font-size: 13px;
            color: #475569;
            min-height: 20px;
            line-height: 1.6;
        }

        .note {
            margin-top: 14px;
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="tag">完整版报告</div>
        <h1>先留个联系方式</h1>
        <p>
            填完后就可以继续查看完整报告并下载 PDF。系统也会自动帮你保存一份客户记录。
        </p>

        <div class="field">
            <label for="leadName">姓名</label>
            <input id="leadName" placeholder="请输入姓名" />
        </div>

        <div class="field">
            <label for="leadContact">邮箱</label>
            <input id="leadContact" placeholder="请输入邮箱" />
        </div>

        <div class="field">
            <label for="leadPhone">电话（可选）</label>
            <input id="leadPhone" placeholder="请输入电话" />
        </div>

        <div class="actions">
            <button class="btn primary" onclick="saveLead()">继续查看报告</button>
            <button class="btn secondary" onclick="goBack()">返回问卷</button>
        </div>

        <div class="status" id="statusText"></div>

        <div class="note">
            提交后会自动记录到后台表格，并向你填写的邮箱发送一封确认邮件。
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw9-l9nzJhaJ8iPBzASRtrSHUCyVF93-bskC_xOu00cYtnDwTxuYbBEc4AkL6wNzN2dfg/exec";

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        async function saveLead() {
            const name = document.getElementById("leadName").value.trim();
            const contact = document.getElementById("leadContact").value.trim();
            const phone = document.getElementById("leadPhone").value.trim();
            const status = document.getElementById("statusText");

            if (!name || !contact) {
                alert("请先填写姓名和邮箱");
                return;
            }

            if (!isValidEmail(contact)) {
                alert("请输入正确的邮箱地址");
                return;
            }

            status.innerText = "正在提交，请稍等...";

            localStorage.setItem("lead_name", name);
            localStorage.setItem("lead_contact", contact);
            localStorage.setItem("lead_phone", phone);
            localStorage.setItem("clientName", name);

            const payload = {
                name: name,
                contact: contact,
                phone: phone
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                status.innerText = "提交成功，正在进入报告页...";
                setTimeout(() => {
                    window.location.href = "report.html";
                }, 1000);
            } catch (error) {
                console.error("提交失败：", error);
                status.innerText = "提交失败，请稍后重试。";
            }
        }

        function goBack() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
