<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>教育资金准备度测评</title>

<style>

body{
font-family:Arial,"PingFang SC","Microsoft YaHei";
background:#f4f7fb;
margin:0;
padding:40px 20px;
}

.container{
max-width:780px;
margin:auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
font-size:28px;
}

.desc{
color:#64748b;
margin-bottom:30px;
line-height:1.7;
}

.question{
margin-bottom:28px;
}

.question-title{
font-weight:700;
margin-bottom:10px;
}

.option{
margin-bottom:8px;
}

button{
margin-top:30px;
padding:14px 22px;
font-size:16px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

input[type=text]{
width:100%;
padding:12px;
border:1px solid #e2e8f0;
border-radius:8px;
margin-top:6px;
box-sizing:border-box;
}

</style>
</head>

<body>

<div class="container">

<h1>家庭教育资金准备度测评</h1>

<div class="desc">
这个小测评主要是帮你快速看一下，现在大概准备到哪一步了。  
没有标准答案，只是帮助你更清楚自己的情况。
</div>

<div class="question">
<div class="question-title">客户姓名</div>
<input id="clientName" type="text" placeholder="请输入客户姓名">
</div>

<div class="question">
<div class="question-title">1 孩子现在大概几年级</div>

<label class="option">
<input type="radio" name="time" value="2"> 小学
</label>

<label class="option">
<input type="radio" name="time" value="5"> 初中
</label>

<label class="option">
<input type="radio" name="time" value="8"> 高中
</label>

<label class="option">
<input type="radio" name="time" value="10"> 已经接近申请
</label>

</div>

<div class="question">
<div class="question-title">2 现在有没有专门准备教育资金</div>

<label class="option">
<input type="radio" name="prep" value="9"> 还没有准备
</label>

<label class="option">
<input type="radio" name="prep" value="6"> 有一点储蓄
</label>

<label class="option">
<input type="radio" name="prep" value="3"> 有专门账户
</label>

<label class="option">
<input type="radio" name="prep" value="1"> 已经规划比较完整
</label>

</div>

<div class="question">
<div class="question-title">3 每月安排教育储蓄会不会有压力</div>

<label class="option">
<input type="radio" name="cash" value="8"> 压力比较大
</label>

<label class="option">
<input type="radio" name="cash" value="6"> 有一点压力
</label>

<label class="option">
<input type="radio" name="cash" value="4"> 可以安排
</label>

<label class="option">
<input type="radio" name="cash" value="2"> 基本没有压力
</label>

</div>

<div class="question">
<div class="question-title">4 家庭保障是否比较完整</div>

<label class="option">
<input type="radio" name="protect" value="7"> 基本没有规划
</label>

<label class="option">
<input type="radio" name="protect" value="5"> 有一点保障
</label>

<label class="option">
<input type="radio" name="protect" value="3"> 大部分已经有
</label>

<label class="option">
<input type="radio" name="protect" value="1"> 非常完整
</label>

</div>

<div class="question">
<div class="question-title">5 是否了解教育资金相关税务</div>

<label class="option">
<input type="radio" name="tax" value="8"> 完全不了解
</label>

<label class="option">
<input type="radio" name="tax" value="6"> 听说过一点
</label>

<label class="option">
<input type="radio" name="tax" value="4"> 有基本了解
</label>

<label class="option">
<input type="radio" name="tax" value="2"> 比较清楚
</label>

</div>

<div class="question">
<div class="question-title">6 是否考虑过助学金影响</div>

<label class="option">
<input type="radio" name="aid" value="8"> 完全没想过
</label>

<label class="option">
<input type="radio" name="aid" value="6"> 听说过
</label>

<label class="option">
<input type="radio" name="aid" value="4"> 有一点了解
</label>

<label class="option">
<input type="radio" name="aid" value="2"> 比较清楚
</label>

</div>

<button onclick="generate()">生成报告</button>

</div>

<script>

function val(name){
let r=document.querySelector('input[name="'+name+'"]:checked');
return r?parseFloat(r.value):0;
}

function generate(){

let clientName=document.getElementById("clientName").value || "客户";

let time=val("time");
let prep=val("prep");
let cash=val("cash");
let protect=val("protect");
let tax=val("tax");
let aid=val("aid");

let score=Math.round(
100-
(time+prep+cash+protect+tax+aid)*1.5
);

let phase="规划建立期";
if(score>80) phase="准备较完整";
if(score<50) phase="需要尽快规划";

let type="规划准备型家庭";

let summary="从这次结果看，现在还属于可以慢慢准备的阶段。越早开始规划，后面压力越小。";

localStorage.setItem("clientName",clientName);

localStorage.setItem("edu_score",score);
localStorage.setItem("edu_phase",phase);
localStorage.setItem("edu_type",type);
localStorage.setItem("edu_summary",summary);

localStorage.setItem("edu_timeIndex",time);
localStorage.setItem("edu_prepIndex",prep);
localStorage.setItem("edu_cashIndex",cash);
localStorage.setItem("edu_protectIndex",protect);
localStorage.setItem("edu_taxIndex",tax);
localStorage.setItem("edu_aidIndex",aid);

window.location.href="lead.html";

}

</script>

</body>
</html>
