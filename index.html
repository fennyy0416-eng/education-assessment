<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>家庭教育资金体检</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f172a;
      color: #fff;
      padding: 24px;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      background: #111827;
      border-radius: 18px;
      padding: 24px;
    }
    h1 {
      margin-top: 0;
      font-size: 30px;
    }
    p.desc {
      color: #cbd5e1;
      line-height: 1.7;
    }
    .q {
      margin: 18px 0;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0b1325;
      color: #fff;
      font-size: 15px;
    }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.95;
    }
    .note {
      margin-top: 12px;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>家庭教育资金体检</h1>
    <p class="desc">用几道题快速生成一份演示版结构分析结果。</p>

    <div class="q">
      <label for="age">1. 孩子的年龄阶段</label>
      <select id="age">
        <option value="2">0–5岁</option>
        <option value="4">6–10岁</option>
        <option value="7">11–14岁</option>
        <option value="10">15–18岁</option>
      </select>
    </div>

    <div class="q">
      <label for="prepare">2. 是否已经开始准备教育资金</label>
      <select id="prepare">
        <option value="2">已有专项教育资金</option>
        <option value="5">有储蓄但没有专门安排</option>
        <option value="8">尚未开始准备</option>
      </select>
    </div>

    <div class="q">
      <label for="childAsset">3. 是否有孩子名下资产</label>
      <select id="childAsset">
        <option value="1">没有</option>
        <option value="9">有</option>
      </select>
    </div>

    <div class="q">
      <label for="saving">4. 家庭每月大约可储蓄金额</label>
      <select id="saving">
        <option value="9">500以下</option>
        <option value="6">500–2000</option>
        <option value="3">2000–5000</option>
        <option value="1">5000以上</option>
      </select>
    </div>

    <div class="q">
      <label for="insurance">5. 是否有长期寿险保障</label>
      <select id="insurance">
        <option value="2">有</option>
        <option value="8">没有</option>
      </select>
    </div>

    <div class="q">
      <label for="incomeType">6. 家庭主要收入类型</label>
      <select id="incomeType">
        <option value="2">W2收入为主</option>
        <option value="5">自雇收入为主</option>
        <option value="7">投资收入占比较高</option>
        <option value="6">混合收入</option>
      </select>
    </div>

    <div class="q">
      <label for="overseas">7. 是否存在海外资产或海外收入</label>
      <select id="overseas">
        <option value="1">没有</option>
        <option value="8">有</option>
      </select>
    </div>

    <button type="button" onclick="goReport()">生成体检结果</button>

    <div class="note">这是稳定简化版，先确保跳转和结果正常，再继续升级雷达图和 PDF。</div>
  </div>

  <script>
    function clamp10(x) {
      return Math.max(0, Math.min(10, x));
    }

    function goReport() {
      var age = Number(document.getElementById("age").value || 0);
      var prepare = Number(document.getElementById("prepare").value || 0);
      var childAsset = Number(document.getElementById("childAsset").value || 0);
      var saving = Number(document.getElementById("saving").value || 0);
      var insurance = Number(document.getElementById("insurance").value || 0);
      var incomeType = Number(document.getElementById("incomeType").value || 0);
      var overseas = Number(document.getElementById("overseas").value || 0);

      var timeIndex = clamp10(age * 0.7 + prepare * 0.3);
      var prepIndex = clamp10((10 - prepare) * 0.9);
      var cashIndex = clamp10(saving * 0.6 + 2);
      var protectIndex = clamp10((insurance + prepare) / 2);
      var taxIndex = clamp10(incomeType * 0.6 + overseas * 0.4);
      var aidIndex = clamp10(childAsset * 0.7 + prepare * 0.15 + overseas * 0.15);

      var totalScore = 100 - (
        timeIndex * 1.4 +
        prepIndex * 1.1 +
        cashIndex * 1.0 +
        protectIndex * 1.1 +
        taxIndex * 0.9 +
        aidIndex * 1.1
      );
      totalScore = Math.max(28, Math.min(96, Math.round(totalScore)));

      var phase = "";
      if (age <= 4) {
        phase = "长期准备期";
      } else if (age <= 7) {
        phase = "规划建立期";
      } else {
        phase = "时间窗口期";
      }

      var maxIndex = Math.max(timeIndex, cashIndex, protectIndex, taxIndex, aidIndex);
      var familyType = "";
      if (maxIndex === timeIndex) {
        familyType = "时间窗口型家庭";
      } else if (maxIndex === aidIndex) {
        familyType = "助学金敏感型家庭";
      } else if (maxIndex === taxIndex) {
        familyType = "税务敏感型家庭";
      } else if (maxIndex === cashIndex) {
        familyType = "现金流平衡型家庭";
      } else {
        familyType = "规划准备型家庭";
      }

      localStorage.setItem("edu_score", String(totalScore));
      localStorage.setItem("edu_phase", phase);
      localStorage.setItem("edu_type", familyType);
      localStorage.setItem("edu_timeIndex", timeIndex.toFixed(1));
      localStorage.setItem("edu_prepIndex", prepIndex.toFixed(1));
      localStorage.setItem("edu_cashIndex", cashIndex.toFixed(1));
      localStorage.setItem("edu_protectIndex", protectIndex.toFixed(1));
      localStorage.setItem("edu_taxIndex", taxIndex.toFixed(1));
      localStorage.setItem("edu_aidIndex", aidIndex.toFixed(1));

      window.location.href = "report.html";
    }
  </script>
</body>
</html>
