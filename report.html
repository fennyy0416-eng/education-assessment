<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家庭教育资金结构分析报告</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f3f6fb;
            color: #1f2937;
        }
        .report {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 18px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 32px;
            color: #0f172a;
        }
        .sub {
            color: #64748b;
            margin-bottom: 28px;
            line-height: 1.7;
        }
        .score-box {
            background: linear-gradient(135deg, #dbeafe, #eff6ff);
            border: 1px solid #bfdbfe;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            margin-bottom: 28px;
        }
        .score {
            font-size: 52px;
            font-weight: 700;
            color: #2563eb;
            line-height: 1;
        }
        .section {
            margin-top: 28px;
        }
        .section h2 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #0f172a;
            border-left: 4px solid #3b82f6;
            padding-left: 10px;
        }
        .card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 18px;
            line-height: 1.8;
        }
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }
        .metric-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px;
        }
        .metric-name {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 6px;
        }
        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            line-height: 1.8;
            color: #64748b;
        }
        .btn {
            display: inline-block;
            margin-top: 28px;
            padding: 14px 22px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
        }
        @media (max-width: 700px) {
            .metrics { grid-template-columns: 1fr; }
            .report { padding: 24px; }
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="report">
        <h1>家庭教育资金结构分析报告</h1>
        <div class="sub">基于当前填写信息生成的演示版结果，仅用于结构观察与沟通参考。</div>

        <div class="score-box">
            <div class="score" id="score">78</div>
            <div>教育资金准备度 / 100</div>
        </div>

        <div class="section">
            <h2>家庭阶段判断</h2>
            <div class="card">
                当前阶段：<span id="phase">规划建立期</span><br>
                家庭类型：<span id="familyType">规划准备型家庭</span>
            </div>
        </div>

        <div class="section">
            <h2>六大结构指数</h2>
            <div class="metrics">
                <div class="metric-box"><div class="metric-name">时间紧迫指数</div><div class="metric-value" id="timeIndex">0</div></div>
                <div class="metric-box"><div class="metric-name">教育准备度指数</div><div class="metric-value" id="prepIndex">0</div></div>
                <div class="metric-box"><div class="metric-name">现金流弹性指数</div><div class="metric-value" id="cashIndex">0</div></div>
                <div class="metric-box"><div class="metric-name">保障完整度指数</div><div class="metric-value" id="protectIndex">0</div></div>
                <div class="metric-box"><div class="metric-name">税务敏感指数</div><div class="metric-value" id="taxIndex">0</div></div>
                <div class="metric-box"><div class="metric-name">助学金敏感指数</div><div class="metric-value" id="aidIndex">0</div></div>
            </div>
        </div>

        <div class="section">
            <h2>系统观察</h2>
            <div class="card" id="observation"></div>
        </div>

        <a class="btn" href="./index.html">返回测评页</a>

        <div class="footer">
            本页面为演示版结构分析报告，不构成税务、法律、投资或保险建议。
        </div>
    </div>

    <script>
        var score = localStorage.getItem("edu_score") || "78";
        var phase = localStorage.getItem("edu_phase") || "规划建立期";
        var familyType = localStorage.getItem("edu_type") || "规划准备型家庭";

        var timeIndex = localStorage.getItem("edu_timeIndex") || "0";
        var prepIndex = localStorage.getItem("edu_prepIndex") || "0";
        var cashIndex = localStorage.getItem("edu_cashIndex") || "0";
        var protectIndex = localStorage.getItem("edu_protectIndex") || "0";
        var taxIndex = localStorage.getItem("edu_taxIndex") || "0";
        var aidIndex = localStorage.getItem("edu_aidIndex") || "0";

        document.getElementById("score").innerText = score;
        document.getElementById("phase").innerText = phase;
        document.getElementById("familyType").innerText = familyType;
        document.getElementById("timeIndex").innerText = timeIndex;
        document.getElementById("prepIndex").innerText = prepIndex;
        document.getElementById("cashIndex").innerText = cashIndex;
        document.getElementById("protectIndex").innerText = protectIndex;
        document.getElementById("taxIndex").innerText = taxIndex;
        document.getElementById("aidIndex").innerText = aidIndex;

        document.getElementById("observation").innerText =
            "当前阶段为「" + phase + "」，家庭类型为「" + familyType + "」。系统判断目前最值得优先关注的是时间安排、账户理解与长期准备节奏之间的配合。";
    </script>
</body>
</html>
